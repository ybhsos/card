<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ybhsos — 디지털 명함</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb--a" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--b" aria-hidden="true"></div>

    <main class="card" id="card">
      <button
        type="button"
        class="theme-toggle"
        id="themeToggle"
        aria-label="다크 모드 전환"
        title="테마 전환"
      >
        <span class="theme-toggle__icon" aria-hidden="true"></span>
      </button>

      <div class="card__avatar" aria-hidden="true">
        <svg
          class="character character--pro"
          viewBox="0 0 200 268"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
        >
          <defs>
            <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" class="char-skin-stop-a" />
              <stop offset="100%" class="char-skin-stop-b" />
            </linearGradient>
            <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" class="char-hair-stop-a" />
              <stop offset="100%" class="char-hair-stop-b" />
            </linearGradient>
            <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" class="char-suit-stop-a" />
              <stop offset="100%" class="char-suit-stop-b" />
            </linearGradient>
          </defs>
          <!-- suit shoulders -->
          <path fill="url(#suit)" d="M12 268 Q100 232 188 268 L188 268H12Z" />
          <!-- shirt + collar -->
          <path class="char-shirt" d="M72 218 L100 248 L128 218 V200H72Z" />
          <path
            class="char-collar"
            fill="none"
            stroke-width="2.2"
            stroke-linejoin="round"
            d="M82 206 L100 228 L118 206"
          />
          <!-- neck -->
          <rect x="82" y="162" width="36" height="52" rx="10" fill="url(#skin)" />
          <!-- ears -->
          <ellipse cx="46" cy="124" rx="9" ry="14" fill="url(#skin)" />
          <ellipse cx="154" cy="124" rx="9" ry="14" fill="url(#skin)" />
          <!-- hair (back volume) -->
          <ellipse cx="100" cy="96" rx="74" ry="64" fill="url(#hair)" />
          <!-- face (slightly elongated for mature proportions) -->
          <ellipse cx="100" cy="122" rx="54" ry="60" fill="url(#skin)" />
          <!-- subtle laugh lines -->
          <path
            class="char-line"
            fill="none"
            stroke-width="1.2"
            stroke-linecap="round"
            opacity="0.25"
            d="M68 132 Q64 138 66 144 M132 132 Q136 138 134 144"
          />
          <!-- eyebrows -->
          <path
            class="char-brow"
            fill="none"
            stroke-width="3.2"
            stroke-linecap="round"
            d="M64 102 Q76 96 88 100 M112 100 Q124 96 136 102"
          />
          <!-- eyes -->
          <ellipse cx="78" cy="114" rx="5" ry="6.5" class="char-eye" />
          <ellipse cx="122" cy="114" rx="5" ry="6.5" class="char-eye" />
          <circle cx="79.5" cy="112.5" r="2" class="char-eye-shine" />
          <circle cx="123.5" cy="112.5" r="2" class="char-eye-shine" />
          <!-- lens gloss (behind frames) -->
          <rect x="56" y="100" width="36" height="28" rx="7" class="char-lens" />
          <rect x="108" y="100" width="36" height="28" rx="7" class="char-lens" />
          <!-- black frame glasses (Wayfarer-style) -->
          <g class="char-frame" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="54" y="98" width="40" height="32" rx="8" stroke-width="5" />
            <rect x="106" y="98" width="40" height="32" rx="8" stroke-width="5" />
            <path d="M94 114h12" stroke-width="5" />
            <path d="M48 112l-10-6" stroke-width="4" />
            <path d="M152 112l10-6" stroke-width="4" />
          </g>
          <!-- nose -->
          <path
            class="char-nose"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
            opacity="0.35"
            d="M100 118v14"
          />
          <!-- composed smile -->
          <path
            d="M86 138 Q100 148 114 138"
            fill="none"
            class="char-mouth"
            stroke-width="2.8"
            stroke-linecap="round"
          />
          <!-- hair: side part & neat top -->
          <path
            fill="url(#hair)"
            d="M38 108 Q42 52 100 44 Q158 52 162 108 Q156 78 118 68 Q100 62 82 68 Q44 78 38 108Z"
          />
          <!-- temple silver (40s hint) -->
          <path
            class="char-silver"
            fill="none"
            stroke-width="3"
            stroke-linecap="round"
            opacity="0.45"
            d="M48 92 Q52 88 58 90 M152 92 Q148 88 142 90"
          />
        </svg>
      </div>

      <header class="card__header">
        <h1 class="card__name">ybhsos</h1>
        <p class="card__company">엔티소프트</p>
        <p class="card__role">바이브코딩 풀스택 개발자 <span class="slash">/</span> CTO</p>
      </header>

      <p class="card__tagline" id="tagline">
        SRM, TMS, MES 전문가 , 바이브 코딩 활용 개발
      </p>

      <section class="card__qr" aria-labelledby="qr-heading">
        <h2 class="card__qr-heading" id="qr-heading">명함 페이지 QR</h2>
        <p class="card__qr-hint">카메라로 스캔하면 이 명함 주소로 이동합니다.</p>
        <div class="card__qr-wrap">
          <div class="card__qr-frame">
            <div id="qrcode" class="card__qr-target"></div>
          </div>
        </div>
        <a
          class="card__qr-link"
          href="https://ybhsos.github.io/card/"
          target="_blank"
          rel="noopener noreferrer"
          >ybhsos.github.io/card</a
        >
      </section>

      <ul class="card__contact">
        <li>
          <a
            class="contact-link contact-link--action"
            href="mailto:ybhsos@naver.com?subject=%EC%97%B0%EB%9D%BD%20%EB%AC%B8%EC%9D%98"
            >이메일 : ybhsos@naver.com</a
          >
        </li>
        <li>
          <span class="contact-link contact-link--action contact-link--static"
            >전화 : 010-4720-XXXX</span
          >
        </li>
        <li>
          <button
            type="button"
            class="contact-link contact-link--linkedin contact-link--copy"
            data-copy-url="https://www.linkedin.com/in/byung-hoon-yeo-527b14193/"
            aria-label="LinkedIn 프로필 주소 복사"
          >
            <svg
              class="contact-link__in-icon"
              viewBox="0 0 24 24"
              width="20"
              height="20"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
              />
            </svg>
            LinkedIn 링크 복사
          </button>
        </li>
        <li>
          <button
            type="button"
            class="contact-link contact-link--youtube contact-link--copy"
            data-copy-url="https://www.youtube.com/@ybhsos8864"
            aria-label="YouTube 채널 주소 복사"
          >
            <svg
              class="contact-link__yt-icon"
              viewBox="0 0 24 24"
              width="20"
              height="20"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
              />
            </svg>
            YouTube 링크 복사
          </button>
        </li>
        <li>
          <button
            type="button"
            class="contact-link contact-link--save"
            id="saveContact"
            aria-label="vCard 파일을 받아 연락처 앱에 저장"
          >
            연락처에 저장
          </button>
        </li>
      </ul>

      <p class="card__hint">명함을 살짝 기울여 보세요.</p>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
